services:

  install:
    image: alpine:latest
    volumes:
      - website:/app
    command: >
      sh -c "
      wget https://github.com/sabre-io/Baikal/releases/download/${BAIKAL_VERSION}/baikal-${BAIKAL_VERSION}.zip -O /tmp/baikal.zip
      && unzip /tmp/baikal.zip -d /app
      && chown -R 82:82 /app/baikal/Specific /app/baikal/config"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
     - "8080:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - website:/var/www
    networks:
      - web_stack

  php:
    image: php:8.1-fpm-alpine
    container_name: php-fpm
    volumes:
      - website:/var/www
    networks:
      - web_stack

networks:
  web_stack:

volumes:
  website:
